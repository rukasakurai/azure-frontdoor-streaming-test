name: E2E Infrastructure & Streaming Test

on:
  workflow_dispatch:
    inputs:
      cleanup:
        description: "Run azd down after tests"
        required: false
        type: boolean
        default: true
      environment:
        description: "azd environment name"
        required: false
        type: string
      location:
        description: "Azure region"
        required: false
        type: string
        default: "japaneast"
  pull_request:
    paths:
      - "app/**"
      - "infra/**"
      - "test.sh"
      - "azure.yaml"

permissions:
  id-token: write
  contents: read

env:
  AZD_ENVIRONMENT: ${{ inputs.environment || format('gha-e2e-{0}-{1}', github.run_id, github.run_attempt) }}
  AZD_LOCATION: ${{ inputs.location || 'japaneast' }}

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Authenticate azd with federated credential
        run: azd auth login --client-id "${{ vars.AZURE_CLIENT_ID }}" --federated-credential-provider github --tenant-id "${{ secrets.AZURE_TENANT_ID }}"

      - name: Initialize azd environment
        run: |
          azd env new "$AZD_ENVIRONMENT" || true
          azd env select "$AZD_ENVIRONMENT"
          azd env set AZURE_LOCATION "$AZD_LOCATION"
          azd env set AZURE_SUBSCRIPTION_ID "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      - name: Provision infrastructure (azd provision)
        run: azd provision --no-prompt

      - name: Deploy application (azd deploy with retries)
        run: |
          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            echo "=== azd deploy attempt $i/$MAX_RETRIES ==="
            if azd deploy; then
              echo "azd deploy succeeded on attempt $i"
              break
            fi
            if [ "$i" -eq "$MAX_RETRIES" ]; then
              echo "::error::azd deploy failed after $MAX_RETRIES attempts"
              exit 1
            fi
            WAIT=$((i * 30))
            echo "::warning::azd deploy failed (attempt $i/$MAX_RETRIES). Retrying in ${WAIT}s..."
            sleep "$WAIT"
          done

      - name: Extract deployment URLs
        id: urls
        run: |
          SERVICE_APP_URI=$(azd env get-value SERVICE_APP_URI)
          AFD_URI=$(azd env get-value AFD_URI)
          echo "direct_url=$SERVICE_APP_URI" >> "$GITHUB_OUTPUT"
          echo "afd_url=$AFD_URI" >> "$GITHUB_OUTPUT"
          echo "Direct URL: $SERVICE_APP_URI"
          echo "AFD URL: $AFD_URI"

      - name: Verify origin health before waiting for AFD
        run: |
          echo "Checking origin App Service health..."
          for i in $(seq 1 12); do
            status=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "${{ steps.urls.outputs.direct_url }}/health" || echo "000")
            echo "Origin attempt $i/12 – HTTP $status"
            if [ "$status" = "200" ]; then
              echo "Origin is healthy"
              break
            fi
            if [ "$i" = "12" ]; then
              echo "::warning::Origin did not return 200 after 12 attempts – AFD may also fail"
            fi
            sleep 5
          done

      - name: Wait for Front Door endpoint to become ready
        run: |
          AFD_HEALTH="${{ steps.urls.outputs.afd_url }}/health"
          MAX_ATTEMPTS=90
          WAIT_INTERVAL=20
          echo "Waiting for AFD endpoint to respond at $AFD_HEALTH (up to $((MAX_ATTEMPTS * WAIT_INTERVAL / 60)) min)..."
          ready=false
          for i in $(seq 1 $MAX_ATTEMPTS); do
            status=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$AFD_HEALTH" || echo "000")
            if [ "$status" = "200" ]; then
              echo "Attempt $i/$MAX_ATTEMPTS – HTTP $status – AFD endpoint is ready"
              ready=true
              break
            fi
            echo "Attempt $i/$MAX_ATTEMPTS – HTTP $status – waiting ${WAIT_INTERVAL}s..."
            sleep "$WAIT_INTERVAL"
          done
          if [ "$ready" != "true" ]; then
            echo "::error::AFD endpoint did not become ready after $MAX_ATTEMPTS attempts (~$((MAX_ATTEMPTS * WAIT_INTERVAL / 60)) min)"
            echo "--- Final diagnostic: verbose curl ---"
            curl -sv --max-time 15 "$AFD_HEALTH" 2>&1 || true
            echo "--- DNS lookup ---"
            AFD_HOST=$(echo "$AFD_HEALTH" | sed 's|https://||;s|/.*||')
            nslookup "$AFD_HOST" 2>&1 || true
            exit 1
          fi

      - name: Run streaming test
        run: |
          chmod +x test.sh
          ./test.sh "${{ steps.urls.outputs.direct_url }}" "${{ steps.urls.outputs.afd_url }}"

      - name: Cleanup (azd down)
        if: always() && (inputs.cleanup != false || github.event_name == 'pull_request')
        run: azd down --no-prompt --force --purge
